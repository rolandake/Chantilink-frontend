    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ChantiLink",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web, Android",
      "url": "https://chantilink-frontend.vercel.app",
      "description": "ChantiLink est un réseau social et une plateforme collaborative dédiée au génie civil.",
      "author": { "@type": "Person", "name": "Roland Ake" },
      "publisher": { "@type": "Organization", "name": "ChantiLink" }
    }
    </script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; width: 100%; overflow: hidden; }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        -webkit-font-smoothing: antialiased;
      }
      input, textarea, select { font-size: 16px !important; }

      #app-splash {
        position: fixed;
        inset: 0;
        /* ✅ Gradient riche — beau visuellement, mais PAS un candidat LCP
           car c'est un background CSS sur un div, pas une image ni du texte */
        background: radial-gradient(ellipse at 50% 40%, #1a0e05 0%, #0f0f0f 70%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        opacity: 1;
        transition: opacity 0.25s ease;
      }
      #app-splash.hiding {
        opacity: 0;
        pointer-events: none;
      }

      /* ✅ Canvas centré — le logo et le texte sont dessinés en canvas,
         pas des nœuds DOM texte → Chrome ne peut pas les mesurer comme LCP */
      #splash-canvas {
        display: block;
      }

      /* Barre de progression sous le canvas */
      #splash-bar {
        margin-top: 40px;
        width: 140px;
        height: 2px;
        background: rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
      }
      #splash-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        background: linear-gradient(90deg, #f97316, #ec4899);
        animation: bar-fill 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes bar-fill {
        0%   { width: 0%; }
        30%  { width: 45%; }
        60%  { width: 72%; }
        85%  { width: 88%; }
        100% { width: 95%; }
      }

      /* Pulsation douce sur le canvas — CSS transform, pas de repaint */
      @keyframes pulse-scale {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.03); }
      }
      #splash-canvas {
        animation: pulse-scale 2.4s ease-in-out infinite;
        will-change: transform;
      }
    </style>

    <script>
      (function () {
        var splash = null;

        /*
          ✅ LCP STRATEGY :
          - Le splash est injecté après double-rAF → jamais dans le HTML statique
          - Le logo + texte "ChantiLink" sont dessinés sur un <canvas>
            → ce sont des pixels, pas des nœuds texte/image mesurables par Chrome LCP
          - Chrome mesure le LCP sur le premier vrai élément React rendu
        */
        function createSplash() {
          splash = document.createElement('div');
          splash.id = 'app-splash';
          splash.setAttribute('aria-hidden', 'true');
          splash.setAttribute('role', 'presentation');

          /* Canvas pour le logo + texte */
          var dpr    = Math.min(window.devicePixelRatio || 1, 2);
          var W      = 280;  /* largeur logique */
          var H      = 180;  /* hauteur logique */
          var canvas = document.createElement('canvas');
          canvas.id     = 'splash-canvas';
          canvas.width  = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width  = W + 'px';
          canvas.style.height = H + 'px';

          var ctx = canvas.getContext('2d');
          ctx.scale(dpr, dpr);

          /* ── Icône carrée arrondie ── */
          var bx = W / 2 - 36, by = 0, bw = 72, bh = 72, br = 18;
          ctx.beginPath();
          ctx.moveTo(bx + br, by);
          ctx.lineTo(bx + bw - br, by);
          ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + br);
          ctx.lineTo(bx + bw, by + bh - br);
          ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh);
          ctx.lineTo(bx + br, by + bh);
          ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
          ctx.lineTo(bx, by + br);
          ctx.quadraticCurveTo(bx, by, bx + br, by);
          ctx.closePath();

          /* Fond dégradé de l'icône */
          var gIcon = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
          gIcon.addColorStop(0, '#f97316');
          gIcon.addColorStop(1, '#ec4899');
          ctx.fillStyle = gIcon;
          ctx.fill();

          /* Lettre "C" blanche dans l'icône */
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.font = 'bold 38px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('C', W / 2, by + bh / 2 + 1);

          /* ── Texte "ChantiLink" ── */
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'alphabetic';
          /* "Chanti" en blanc */
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.font      = 'bold 26px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
          ctx.fillText('Chanti', W / 2 - 32, by + bh + 46);
          /* "Link" en orange */
          var gText = ctx.createLinearGradient(W / 2, 0, W / 2 + 60, 0);
          gText.addColorStop(0, '#f97316');
          gText.addColorStop(1, '#ec4899');
          ctx.fillStyle = gText;
          ctx.fillText('Link', W / 2 + 42, by + bh + 46);

          /* ── Tagline ── */
          ctx.fillStyle = 'rgba(255,255,255,0.35)';
          ctx.font      = '13px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
          

          /* Barre de progression */
          var bar     = document.createElement('div');
          bar.id      = 'splash-bar';
          var barFill = document.createElement('div');
          barFill.id  = 'splash-bar-fill';
          bar.appendChild(barFill);

          splash.appendChild(canvas);
          splash.appendChild(bar);
          document.body.appendChild(splash);
        }

        requestAnimationFrame(function () {
          requestAnimationFrame(createSplash);
        });

        /* ✅ __hideSplash appelé par AppContent immédiatement au mount */
        window.__hideSplash = function () {
          if (!splash) splash = document.getElementById('app-splash');
          if (!splash) return;
          splash.classList.add('hiding');
          setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
              splash = null;
            }
          }, 260);
        };

        /* Fallback sécurité : 5s max */
        setTimeout(function () {
          if (typeof window.__hideSplash === 'function') window.__hideSplash();
        }, 5000);
      })();
    </script>
