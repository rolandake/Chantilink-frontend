    <style>
      * {

      /*
        ✅ FIX LCP FINAL :
        Le splash n'existe PAS dans le HTML statique.
        Il est créé dynamiquement par JS APRÈS le premier paint.
        Le navigateur ne peut pas le mesurer comme LCP
        car il n'existait pas encore au moment de la mesure.
      */

      /* Splash créé dynamiquement */
      #app-splash {
        position: fixed;
        inset: 0;
        background: #111111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 24px;
        opacity: 1;
        transition: opacity 0.25s ease;
      }
      #app-splash.hiding {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #f97316, #ec4899);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 900;
        color: white;
        font-family: "Inter", sans-serif;
        box-shadow: 0 8px 32px rgba(249, 115, 22, 0.4);
      }
      #splash-title {
        font-size: 24px;
        font-weight: 700;
        background: linear-gradient(135deg, #f97316, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-family: "Inter", sans-serif;
      }
      #splash-bar {
        width: 160px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }
      #splash-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #f97316, #ec4899);
        border-radius: 2px;
        animation: splash-progress 2.5s ease-out forwards;
      }
      @keyframes splash-progress {
        0%   { width: 0%;  }
        40%  { width: 60%; }
        70%  { width: 80%; }
        100% { width: 95%; }
      }
    </style>

    <!--
      ✅ FIX LCP FINAL — stratégie : splash créé APRÈS le premier paint

      PROBLÈME PRÉCÉDENT :
        - Le splash était dans le HTML statique
        - Chrome le détectait comme candidat LCP même avec opacity:0
        - Même avec display:none après, Chrome gardait la référence

      SOLUTION :
        - Le HTML statique ne contient PAS le splash
        - Le splash est injecté dans le DOM via JS, après double rAF
        - Au moment de la mesure LCP (premier paint), le splash n'existe pas
        - Chrome mesure le LCP sur #root (le vrai contenu React)

      __hideSplash() : appelé par AppContent useEffect → retire le splash du DOM
    -->
    <script>
      (function () {
        var splash = null;

        // ✅ Créer le splash APRÈS le premier paint (double rAF)
        // → jamais candidat LCP car inexistant au moment de la mesure
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            splash = document.createElement('div');
            splash.id = 'app-splash';
            splash.setAttribute('role', 'progressbar');
            splash.setAttribute('aria-label', 'Chargement de ChantiLink');
            splash.innerHTML =
              '<div id="splash-logo">C</div>' +
              '<div id="splash-title">ChantiLink</div>' +
              '<div id="splash-bar"><div id="splash-bar-fill"></div></div>';
            document.body.appendChild(splash);
          });
        });

        // ✅ Appelé par AppContent useEffect dès que React est prêt
        window.__hideSplash = function () {
          if (!splash) {
            // Si React est monté avant le double rAF (très rare), chercher dans le DOM
            splash = document.getElementById('app-splash');
          }
          if (!splash) return;

          splash.classList.add('hiding');

          // ✅ FIX LCP CRITIQUE : removeChild au lieu de display:none
          // display:none garde l'élément dans le DOM → Chrome peut encore le reporter
          // removeChild le retire complètement → Chrome ne peut plus le mesurer
          setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
              splash = null;
            }
          }, 300);
        };

        // ✅ Fallback sécurité — masquer après 8s si React plante
        setTimeout(function () {
          if (typeof window.__hideSplash === 'function') {
            window.__hideSplash();
          }
        }, 8000);
      })();
    </script>
